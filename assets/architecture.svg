<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#111"/>
    </marker>
    <style>
      .box { fill: #fff; stroke: #111; stroke-width: 2; rx: 12; ry: 12; }
      .box-dim { fill: #f6f6f6; stroke: #d4d4d4; stroke-width: 2; }
      .title { font-size: 22px; font-weight: 700; fill: #111; }
      .sub { font-size: 14px; fill: #555; }
      .label { font-size: 13px; fill: #111; font-weight: 600; }
      .conn { stroke: #111; stroke-width: 2; fill: none; }
      .hero { font-size: 14px; fill: #888; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1200" height="520" fill="#fafafa"/>

  <text x="600" y="40" text-anchor="middle" class="hero">HOW IT WORKS</text>

  <!-- User app -->
  <rect x="60" y="180" width="220" height="150" class="box"/>
  <text x="170" y="225" text-anchor="middle" class="title">Your App</text>
  <text x="170" y="255" text-anchor="middle" class="sub">Node.js · TypeScript</text>
  <text x="170" y="280" text-anchor="middle" class="sub">@parel-cloud/node</text>
  <text x="170" y="305" text-anchor="middle" class="sub">openai peer dep</text>

  <!-- Gateway -->
  <rect x="440" y="140" width="320" height="230" class="box"/>
  <text x="600" y="185" text-anchor="middle" class="title">Parel Gateway</text>
  <text x="600" y="215" text-anchor="middle" class="sub">api.parel.cloud</text>
  <line x1="480" y1="235" x2="720" y2="235" stroke="#e5e5e5" stroke-width="1"/>
  <text x="600" y="260" text-anchor="middle" class="label">OpenAI-compatible router</text>
  <text x="600" y="282" text-anchor="middle" class="sub">Auth · budget · rate limit</text>
  <text x="600" y="303" text-anchor="middle" class="sub">KVKK PII · audit trail</text>
  <text x="600" y="324" text-anchor="middle" class="sub">SQS task queue · compare</text>
  <text x="600" y="348" text-anchor="middle" class="sub">BYOM fleet control</text>

  <!-- Provider cluster -->
  <rect x="920" y="70" width="220" height="380" class="box-dim"/>
  <text x="1030" y="105" text-anchor="middle" class="title" style="fill:#666">100+ providers</text>

  <rect x="940" y="125" width="180" height="45" class="box"/>
  <text x="1030" y="153" text-anchor="middle" class="label">OpenAI · Anthropic</text>

  <rect x="940" y="180" width="180" height="45" class="box"/>
  <text x="1030" y="208" text-anchor="middle" class="label">Google · Mistral</text>

  <rect x="940" y="235" width="180" height="45" class="box"/>
  <text x="1030" y="263" text-anchor="middle" class="label">fal.ai · DashScope</text>

  <rect x="940" y="290" width="180" height="45" class="box"/>
  <text x="1030" y="318" text-anchor="middle" class="label">ElevenLabs · Flux</text>

  <rect x="940" y="345" width="180" height="45" class="box"/>
  <text x="1030" y="373" text-anchor="middle" class="label">Whisper · Kokoro</text>

  <rect x="940" y="400" width="180" height="35" class="box"/>
  <text x="1030" y="423" text-anchor="middle" class="label">RunPod · Modal · Vast</text>

  <!-- Arrows -->
  <line x1="285" y1="255" x2="435" y2="255" class="conn" marker-end="url(#arrow)"/>
  <text x="360" y="245" text-anchor="middle" class="sub">HTTPS + Bearer</text>

  <line x1="765" y1="255" x2="915" y2="255" class="conn" marker-end="url(#arrow)"/>
  <text x="840" y="245" text-anchor="middle" class="sub">one API</text>

  <!-- Bottom tagline -->
  <text x="600" y="480" text-anchor="middle" style="font-size:15px;fill:#111;font-weight:600">One client, one key, 100+ models, full BYOM GPU lifecycle.</text>
</svg>
