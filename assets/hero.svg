<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <style>
      .big { font-size: 112px; font-weight: 800; fill: #ffffff; letter-spacing: -3px; }
      .big-dim { font-size: 112px; font-weight: 800; fill: #4a4a4a; letter-spacing: -3px; }
      .mark { font-size: 26px; font-weight: 600; fill: #fafafa; letter-spacing: 0.5px; }
      .num { font-size: 128px; font-weight: 800; fill: #ffffff; letter-spacing: -4px; }
      .numlabel { font-size: 28px; font-weight: 400; fill: #cfcfcf; }
      .tag { font-size: 20px; fill: #9b9b9b; letter-spacing: 3px; }
      .divider { stroke: #2a2a2a; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Parel logo (5-point star) + wordmark -->
  <g transform="translate(80,70)">
    <g transform="translate(0,0)">
      <g fill="#ffffff">
        <circle cx="24" cy="4" r="4"/>
        <circle cx="44" cy="20" r="4"/>
        <circle cx="36" cy="44" r="4"/>
        <circle cx="12" cy="44" r="4"/>
        <circle cx="4" cy="20" r="4"/>
        <line x1="24" y1="4" x2="36" y2="44" stroke="#ffffff" stroke-width="2"/>
        <line x1="24" y1="4" x2="12" y2="44" stroke="#ffffff" stroke-width="2"/>
        <line x1="44" y1="20" x2="12" y2="44" stroke="#ffffff" stroke-width="2"/>
        <line x1="44" y1="20" x2="4" y2="20" stroke="#ffffff" stroke-width="2"/>
        <line x1="4" y1="20" x2="36" y2="44" stroke="#ffffff" stroke-width="2"/>
      </g>
    </g>
    <text x="70" y="35" class="mark">parel.cloud</text>
  </g>

  <!-- Headline -->
  <text x="80" y="310" class="big">Run.</text>
  <text x="80" y="420" class="big">Use.</text>
  <text x="80" y="530" class="big-dim">Compare.</text>

  <!-- Side stat -->
  <line x1="720" y1="240" x2="720" y2="480" class="divider"/>
  <text x="760" y="360" class="num">100+</text>
  <text x="760" y="400" class="numlabel">AI models</text>

  <!-- Bottom tagline -->
  <text x="80" y="595" class="tag">LLM · IMAGE · VIDEO · SPEECH · BYOM GPU</text>
</svg>
